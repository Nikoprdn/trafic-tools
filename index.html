<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RÉGIONS — 8 Villes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --mono:'Share Tech Mono',monospace; --display:'Oswald',sans-serif;
    --bg:#111214; --s1:#1a1c1f; --s2:#212428; --s3:#181a1d;
    --border:#2e3238; --cyan:#b0bec5; --cyan-dim:#78909c;
    --green:#66bb6a; --green-dk:#2e4a2e;
    --yellow:#ffa726; --orange:#ef6c00; --red:#ef5350;
    --txt:#cfd8dc; --txt-dim:#607d8b; --txt-mute:#37474f;
  }
  html,body{background:var(--bg)!important;min-height:100vh;overflow-x:hidden;width:100%;}
  .navbar.is-console{background:var(--s1);border-bottom:1px solid var(--border);}
  .navbar-brand .navbar-item{font-family:var(--display);font-size:20px;font-weight:700;color:var(--cyan);letter-spacing:2px;}
  .clock-display{font-family:var(--mono);font-size:22px;color:var(--cyan);letter-spacing:3px;}
  .section.is-console{padding:.75rem;background:var(--bg);}

  /* Cards diffuseurs */
  .card.is-dark-card{background:var(--s1);border:1px solid var(--border);border-radius:8px;box-shadow:none;position:relative;}
  .card.is-dark-card .card-header{background:var(--s2);border-bottom:1px solid var(--border);box-shadow:none;border-radius:8px 8px 0 0;}
  .card.is-dark-card .card-content{padding:0;}
  .card.is-dark-card .card-footer{background:var(--s3);border-top:1px solid var(--border);border-radius:0 0 8px 8px;padding:.4rem .75rem;gap:.75rem;}
  .card.is-dark-card .card-footer-item{color:var(--txt-dim);font-family:var(--mono);font-size:10px;border:none;padding:0;justify-content:flex-start;}
  .diff-badge{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:4px;}
  .notification.is-onair{background:var(--s2);border:1px solid var(--border);border-top:none;border-radius:0;padding:.4rem .75rem;margin:0;display:flex;align-items:center;justify-content:space-between;transition:background .2s,border-color .2s;}

  /* EN DIRECT */
  .diff-card-header.is-live{background:#1a0000!important;border-bottom-color:#cc0000!important;}
  .diff-card-header.is-live .diff-badge{background:#cc0000!important;color:#fff!important;border-color:#ff2020!important;}
  .diff-onair-bar.is-live{background:#1a0000!important;border-color:#cc0000!important;}
  .diff-onair-bar.is-live .onair-title{color:#ff2020!important;}
  .diff-onair-bar.is-live .dot-live{background:#ff0000!important;box-shadow:0 0 8px #ff0000!important;animation:live-pulse .8s ease-in-out infinite!important;}
  .card.is-dark-card.diff-is-live{border-color:#cc0000!important;box-shadow:none!important;background:#100000!important;}
  .card.is-dark-card.diff-is-live .card-header{background:#1a0000!important;border-bottom-color:#cc0000!important;}
  @keyframes live-pulse{0%,100%{opacity:1;box-shadow:0 0 10px #ff0000;}50%{opacity:.5;box-shadow:0 0 4px #ff0000;}}
  .diff-progress-wrap{position:relative;height:3px;background:#222428;overflow:hidden;}
  .diff-progress-fill{position:absolute;left:0;top:0;height:100%;background:#cc0000;transition:width .08s linear;}
  .table.is-radio tbody tr.row-active::before{background:#cc0000!important;}
  .table.is-radio tbody tr.row-active::after{content:'';position:absolute;top:0;bottom:0;left:var(--out-pct,100%);width:3px;background:#ff8800;z-index:4;pointer-events:none;}

  .onair-title{font-family:var(--display);font-size:18px;font-weight:700;color:var(--txt);letter-spacing:2px;}
  .onair-track-name{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:1px;color:var(--yellow);margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
  .dot-live{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1s step-start infinite;vertical-align:middle;margin-right:5px;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Table compacte */
  .table.is-radio{background:transparent;width:100%;}
  .table.is-radio thead th{background:var(--s3);color:var(--txt-mute);font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;border-color:var(--border)!important;padding:4px 6px;font-weight:400;}
  .table.is-radio tbody tr{border-bottom:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;}
  .table.is-radio tbody tr:hover td{background:#1a1c22;}
  .table.is-radio tbody td{border-color:var(--border)!important;color:var(--txt-dim);padding:0 6px;height:44px;vertical-align:middle;white-space:nowrap;}
  .table.is-radio tbody tr.row-active{background:#1a0000!important;border-left:3px solid #ff0000!important;border-top:1px solid #880000!important;border-bottom:1px solid #880000!important;}
  .table.is-radio tbody tr.row-active td{height:72px;vertical-align:middle;position:relative;z-index:2;}
  .table.is-radio tbody tr.row-active::before{content:'';position:absolute;inset:0;background:#cc0000;z-index:0;transform-origin:left;transform:scaleX(var(--prog,0));transition:transform 0.05s linear;}
  .table.is-radio tbody tr.row-next{background:#071408;border-left:2px solid var(--green-dk);}
  .row-active-title{font-family:var(--display);font-size:16px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative;z-index:3;}
  .row-active-tc{font-family:var(--mono);font-size:12px;color:#ff4040;letter-spacing:1px;font-weight:700;position:relative;z-index:3;}
  .cell-num{width:28px;font-family:var(--mono);font-size:11px;text-align:center;}
  .cell-num.is-playing{color:var(--red)!important;}
  .cell-cd{width:72px;font-family:var(--mono);font-size:11px;text-align:right;padding-right:8px!important;}
  .cell-bar{width:4px;padding:0!important;}
  .color-bar{height:44px;width:4px;display:block;}

  /* Boutons */
  .button{font-family:var(--mono)!important;font-size:10px!important;letter-spacing:1px!important;border-radius:2px!important;}
  .button.is-dark{background:transparent!important;border-color:var(--border)!important;color:var(--txt-dim)!important;}
  .button.is-success{background:transparent!important;border-color:var(--green)!important;color:var(--green)!important;}
  .button.is-success:hover{background:#052210!important;}
  .button.is-danger{background:transparent!important;border-color:var(--red)!important;color:var(--red)!important;}
  .button.is-danger:hover{background:#200808!important;}
  .button.is-auto{background:transparent!important;border-color:var(--border)!important;color:var(--txt-dim)!important;transition:all .15s!important;}
  .button.is-auto.active{background:#0a2a00!important;border-color:var(--green)!important;color:var(--green)!important;}
  .tag{font-family:var(--mono)!important;font-size:9px!important;letter-spacing:1px!important;border-radius:2px!important;}

  /* Drop zone compacte */
  .file-drop-zone{border:1px dashed var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center;margin:4px 8px;}
  .file-drop-zone:hover,.file-drop-zone.drag-over{border-color:var(--cyan-dim);background:#1a1c22;}
  .file-drop-zone input[type=file]{display:none;}
  .fdz-row{display:flex;align-items:center;justify-content:center;gap:6px;}
  .fdz-icon{font-family:var(--mono);font-size:12px;color:var(--cyan-dim);}
  .fdz-text{font-family:var(--mono);font-size:9px;color:var(--txt-dim);letter-spacing:1px;}
  .fdz-count{font-family:var(--mono);font-size:8px;color:var(--cyan);}
  .fdz-add-badge{font-family:var(--mono);font-size:8px;color:var(--green);background:#0a1a0a;border:1px solid var(--green-dk);border-radius:2px;padding:1px 4px;}

  /* VU strip */
  .vu-strip{position:absolute;top:0;right:-8px;bottom:0;width:6px;border-radius:0 3px 3px 0;display:flex;flex-direction:column-reverse;gap:1px;padding:2px 0;overflow:hidden;z-index:5;background:rgba(6,11,22,.9);border:1px solid var(--border);border-left:none;}
  .vu-strip-bar{width:100%;border-radius:1px;min-height:2px;flex:1;opacity:0.08;transition:opacity .05s ease-out;}

  /* Waveform */
  .wv-handle{position:absolute;top:0;bottom:0;width:3px;cursor:ew-resize;z-index:4;transform:translateX(-1.5px);}
  .wv-handle-in{background:#66bb6a;}
  .wv-handle-out{background:#ef5350;}
  .wv-handle::after{content:'';position:absolute;top:0;bottom:0;left:-8px;right:-8px;}

  /* Voyant RC */
  @keyframes blink-ext{0%,100%{opacity:1}50%{opacity:.3}}
  #rc-status-dot.connected{animation:none!important;}
  #sig-status-bar{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:5px 1rem;background:#0e1012;border-bottom:1px solid #222428;display:flex;align-items:center;gap:12px;}
  .sig-dot{width:8px;height:8px;border-radius:50%;background:#ef5350;flex-shrink:0;transition:background .3s;}
  .sig-dot.on{background:#66bb6a;box-shadow:0 0 6px #66bb6a;}

  /* Grid des diffuseurs */
  .diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;}
  @media(max-width:900px){.diff-grid{grid-template-columns:1fr;}}

  /* Voyants ON AIR globaux */
  .onair-badge-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:8px 14px;background:#0e1012;border-top:1px solid #222428;}
  .onair-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:4px;border:1px solid #2e3238;background:#151719;transition:all .2s;}
  .onair-badge.on-air{border-color:#cc0000;background:#1a0000;}
  .onair-badge.off-air{border-color:#2e3238;background:#151719;}
  .onair-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .2s;}
  .onair-badge.on-air .onair-dot{background:#ff0000;box-shadow:0 0 6px #ff0000;animation:live-pulse .8s ease-in-out infinite;}
  .onair-badge.off-air .onair-dot{background:#37474f;}
  .onair-label{font-family:var(--mono);font-size:9px;letter-spacing:1px;font-weight:700;}
  .onair-badge.on-air .onair-label{color:#ff2020;}
  .onair-badge.off-air .onair-label{color:#37474f;}
  .onair-state{font-family:var(--display);font-size:12px;font-weight:700;letter-spacing:1px;transition:all .2s;}
  .onair-badge.on-air .onair-state{color:#ff2020;}
  .onair-badge.off-air .onair-state{color:#37474f;}
  .rc-now-playing{padding:6px 14px;background:#0e1012;border-top:1px solid #222428;display:flex;align-items:center;gap:8px;}
  .rc-now-label{font-family:var(--mono);font-size:8px;color:#37474f;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
  .rc-now-track{font-family:var(--display);font-size:14px;font-weight:700;color:#455a64;letter-spacing:1px;}

  /* START ALL button */
  .start-all-btn{background:transparent;border:1px solid #455a64;color:#78909c;font-family:var(--mono);font-size:10px;padding:4px 14px;border-radius:3px;cursor:pointer;letter-spacing:1px;transition:all .15s;}
  .start-all-btn:hover{background:#1e272b;border-color:#78909c;color:#b0bec5;}
  .start-all-btn.running{background:#0a1a00;border-color:#66bb6a;color:#66bb6a;}
</style>
</head>
<body>

<nav class="navbar is-console" role="navigation">
  <div class="navbar-brand">
    <a class="navbar-item">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none" style="margin-right:8px">
        <circle cx="16" cy="16" r="14" stroke="#b0bec5" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="6" stroke="#b0bec5" stroke-width="1.5"/>
        <circle cx="16" cy="16" r="2" fill="#b0bec5"/>
      </svg>RÉGIONS — 8 VILLES
    </a>
  </div>
  <div class="navbar-end">
    <div class="navbar-item" style="gap:.6rem;display:flex;align-items:center">
      <!-- Voyant RC -->
      <div style="display:flex;align-items:center;gap:6px;padding:3px 10px;border:1px solid #1e2a40;border-radius:10px;" id="rc-status-pill">
        <div id="rc-status-dot" style="width:10px;height:10px;border-radius:50%;background:#e03020;box-shadow:0 0 8px #e03020;transition:all .3s;animation:blink-ext .8s step-start infinite;flex-shrink:0"></div>
        <span id="rc-status-lbl" style="font-family:var(--mono);font-size:9px;color:#e03020;letter-spacing:1px;font-weight:700">RC ✗</span>
      </div>
      <!-- START ALL -->
      <button class="start-all-btn" id="start-all-btn" onclick="startAllDiffuseurs()">⚡ START ALL</button>
      <button class="start-all-btn" id="raccro-regio-btn" onclick="runRaccroRegio()" style="border-color:#455a64;color:#78909c" title="Lance le Diff A de Radio Console">⚡ RACCRO RC</button>
      <div class="clock-display" id="clock">--:--:--</div>
    </div>
  </div>
</nav>

<div id="sig-status-bar">
  <div class="sig-dot" id="sig-dot"></div>
  <span id="sig-txt" style="color:var(--txt-mute)">Connexion Cloudflare…</span>
  <span style="margin-left:auto;color:var(--txt-mute)" id="sig-last">—</span>
</div>

<section class="section is-console">
<div style="display:flex;flex-direction:column;gap:.75rem">

<!-- Grid 2 colonnes -->
<div class="diff-grid" id="diff-grid-container">
<!-- Les 6 cards sont générées en JS -->
</div>

<!-- Panneau monitoring audio : sélecteur solo + VU par ville -->
<div class="card is-dark-card" style="border-radius:6px">
  <div style="background:var(--s2);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;justify-content:space-between">
    <span style="font-family:var(--display);font-size:12px;font-weight:700;color:var(--txt);letter-spacing:2px">MONITORING</span>
    <span style="font-family:var(--mono);font-size:8px;color:var(--txt-mute);letter-spacing:2px">ÉCOUTE SOLO</span>
  </div>
  <div style="padding:10px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px" id="monitoring-grid">
    <!-- généré en JS -->
  </div>
</div>

<!-- Encart RC + voyants -->
<div class="card is-dark-card" style="border-radius:6px">
  <div class="rc-now-playing">
    <span class="rc-now-label">RC ▶</span>
    <span class="rc-now-track" id="rc-playing-track">Aucune diffusion</span>
  </div>
  <div class="onair-badge-wrap" id="onair-badges-container">
    <!-- généré en JS -->
  </div>
</div>

</div>
</section>

<script>
// ═══════════════════════════════════════════════════════
// VILLES — 6 diffuseurs pour 8 villes (certains partagent)
// ═══════════════════════════════════════════════════════
const VILLES=[
  {id:'marseille', label:'MARSEILLE', color:'#1565c0', accent:'#42a5f5'},
  {id:'nice',      label:'NICE',      color:'#6a1b9a', accent:'#ce93d8'},
  {id:'strasbourg',label:'STRASBOURG',color:'#1b5e20', accent:'#66bb6a'},
  {id:'lyon',      label:'LYON',      color:'#e65100', accent:'#ffb74d'},
  {id:'bordeaux',  label:'BORDEAUX',  color:'#880e4f', accent:'#f48fb1'},
  {id:'toulouse',  label:'TOULOUSE',  color:'#004d40', accent:'#4db6ac'},
  {id:'lille',     label:'LILLE',     color:'#37474f', accent:'#90a4ae'},
  {id:'nantes',    label:'NANTES',    color:'#4e342e', accent:'#a1887f'},
];

// 6 diffuseurs : villes[0..5] = les 6 premières, villes[6..7] partagent sur diffuseurs 0 et 1
// Architecture : D[0]=Marseille, D[1]=Nice, D[2]=Strasbourg, D[3]=Lyon, D[4]=Bordeaux, D[5]=Toulouse
// Lille et Nantes sont des villes distinctes sur D[6] et D[7] — mais le projet dit 6 diffuseurs
// On fait donc 8 diffuseurs (un par ville) — plus clair et plus souple
const N_DIFF=8;

const CONFIGS=VILLES.map((v,i)=>({
  tracks:[],
  ids:{
    avant:`${v.id}-avant`, avance:`${v.id}-avance`,
    counter:`${v.id}-counter`,
    body:`${v.id}-body`,
    micros:`${v.id}-micros`,
    total:`${v.id}-total`,
    suffix:`${v.id}-suffix`,
    progress:`${v.id}-progress`
  },
  fdzCount:`${v.id}-fdz-count`,
  autoBtn:`${v.id}-auto-btn`,
  ville:v
}));

const DIFF_COLORS_D3=['#1a6b3a','#1a3a6e','#5b21b6','#6b3a1a','#1a5a6b','#3a1a6b','#6b5a1a','#2a4a1a'];
const WV_DATA_CACHE={};

// ═══════════════════════════════════════════════════════
// GÉNÉRATION DYNAMIQUE DES CARDS
// ═══════════════════════════════════════════════════════
function buildCards(){
  const grid=document.getElementById('diff-grid-container');
  const badges=document.getElementById('onair-badges-container');
  grid.innerHTML='';badges.innerHTML='';

  VILLES.forEach((v,i)=>{
    // Card diffuseur
    const card=document.createElement('div');
    card.className='card is-dark-card';
    card.id=`card-${v.id}`;
    card.innerHTML=`
      <div class="card-header diff-card-header" id="diff-header-${i}" style="display:flex;align-items:stretch">
        <div style="display:flex;align-items:center;padding:0 .75rem;border-right:1px solid #2e3238">
          <span class="tag diff-badge" style="background:${v.color}22;color:${v.accent};border:1px solid ${v.color}">${v.label}</span>
        </div>
        <div class="notification is-onair diff-onair-bar" id="diff-onair-${i}" style="flex:1;margin:0;border:none;border-radius:0;border-right:1px solid #2e3238">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="dot-live"></span>
            <span class="onair-title" style="font-size:16px;letter-spacing:1px">${v.label}</span>
            <span id="onair-track-${i}" class="onair-track-name" style="font-size:12px"></span>
          </div>
          <div style="display:flex;align-items:center;gap:4px">
            <button class="button is-success is-small is-outlined" onclick="D[${i}].togglePlay()">▶</button>
            <button class="button is-danger is-small is-outlined" onclick="D[${i}].stopAll()">■</button>
            <button class="button is-auto is-small" id="${v.id}-auto-btn" onclick="D[${i}].toggleAuto()">AUTO</button>
            <span class="tag" style="background:#111214;color:#37474f;border:1px solid #2e3238;font-size:8px">
              <strong id="${v.id}-counter" style="color:#455a64">0/0</strong>
            </span>
          </div>
        </div>
      </div>
      <div class="diff-progress-wrap"><div class="diff-progress-fill" id="${v.id}-progress-fill" style="width:0%"></div></div>
      <div class="file-drop-zone" id="fdz-${v.id}" 
           onclick="document.getElementById('fi-${v.id}').click()" 
           ondragover="event.preventDefault();this.classList.add('drag-over')" 
           ondragleave="this.classList.remove('drag-over')" 
           ondrop="handleDropD3(event,${i})">
        <input type="file" id="fi-${v.id}" multiple accept="audio/*" onchange="handleFilesD3(this.files,${i})">
        <div class="fdz-row">
          <span class="fdz-icon">⊕</span>
          <span class="fdz-text">${v.label} — glisser ou cliquer</span>
          <span class="fdz-add-badge">+ ADD</span>
          <span class="fdz-count" id="${v.id}-fdz-count">Aucun fichier</span>
        </div>
      </div>
      <div class="card-content">
        <table class="table is-radio is-fullwidth is-narrow">
          <thead><tr>
            <th style="width:28px">#</th>
            <th style="min-width:140px">Titre</th>
            <th style="min-width:160px">Waveform</th>
            <th style="width:72px;text-align:right">Durée</th>
            <th style="width:72px;text-align:right;padding-right:8px">OUT</th>
            <th style="width:4px"></th>
          </tr></thead>
          <tbody id="${v.id}-body"></tbody>
        </table>
      </div>
      <div class="card-footer">
        <span class="card-footer-item">Écoulé&nbsp;<strong id="${v.id}-micros" style="color:#f07800;font-family:var(--mono)">00:00</strong></span>
        <span class="card-footer-item" style="margin-left:auto">Total&nbsp;<strong id="${v.id}-total" style="color:#cfd8dc;font-family:var(--mono);font-size:14px">00:00:00</strong>&nbsp;<span id="${v.id}-suffix" style="color:${v.accent};font-family:var(--display);font-size:13px;font-weight:700">A</span></span>
      </div>
      <div class="vu-strip" id="vu-strip-${v.id}">
        ${Array(16).fill(0).map((_,j)=>`<div class="vu-strip-bar" style="background:${j>=14?'#e03020':j>=11?'#f5c400':v.accent}"></div>`).join('')}
      </div>`;
    grid.appendChild(card);

    // Badge ON AIR
    const badge=document.createElement('div');
    badge.className='onair-badge off-air';
    badge.id=`badge-${v.id}`;
    badge.innerHTML=`
      <div class="onair-dot"></div>
      <span class="onair-label">${v.label}</span>
      <span class="onair-state" id="badge-${v.id}-state">OFF AIR</span>`;
    badges.appendChild(badge);
  });

  // Badge MIROIR sur les diffuseurs 1..7
  VILLES.forEach((v,i)=>{
    if(i===0) return;
    const bar=document.querySelector(`#card-${v.id} .notification`);
    if(bar){
      const m=document.createElement('span');
      m.style.cssText='font-family:var(--mono);font-size:7px;color:#37474f;background:#151719;border:1px solid #2e3238;border-radius:2px;padding:1px 6px;letter-spacing:2px;margin-left:6px;';
      m.textContent='MIROIR';
      bar.querySelector('.button')?.parentElement?.insertBefore(m, bar.querySelector('.button'));
    }
  });
}

// Peindre les mini VU dans le panneau monitoring
function _paintAllMonVU(){
  VILLES.forEach((_,i)=>{
    const cv = document.getElementById(`mon-vu-${i}`);
    if(!cv) return;
    const ctx = cv.getContext('2d');
    const W=cv.width, H=cv.height;
    ctx.fillStyle='#0d0f12'; ctx.fillRect(0,0,W,H);
    if(!_vuD3[i]){
      // Pas de signal : barres grises
      for(let b=0;b<8;b++){
        ctx.fillStyle='#1a1c22';
        ctx.fillRect(3,H-4-(b*5),W-6,3);
      }
      return;
    }
    const data=new Float32Array(_vuD3[i].aL.fftSize);
    _vuD3[i].aL.getFloatTimeDomainData(data);
    let s=0; for(const v of data) s+=v*v;
    const rms=Math.sqrt(s/data.length);
    const db=rms>0?Math.max(-48,20*Math.log10(rms)):-48;
    const active=Math.round(((db+48)/48)*8);
    for(let b=0;b<8;b++){
      const lit=b<active;
      const color = b>=6 ? '#ef5350' : b>=4 ? '#ffa726' : '#66bb6a';
      ctx.fillStyle = lit ? color : '#1a1c22';
      ctx.fillRect(3, H-4-(b*5), W-6, 3);
    }
  });
}

const SIG_URL='https://radio-signaling.nicolas7lejeune.workers.dev';
let _rcOnline=false,_rcPlaying=false,_rcTrack='';

function _rcSetStatus(online){
  const dot=document.getElementById('rc-status-dot');
  const lbl=document.getElementById('rc-status-lbl');
  const dot2=document.getElementById('sig-dot');
  const txt=document.getElementById('sig-txt');
  const last=document.getElementById('sig-last');
  if(dot){dot.style.background=online?'#00d96a':'#e03020';dot.style.boxShadow=online?'0 0 8px #00d96a':'0 0 8px #e03020';dot.classList.toggle('connected',online);dot.style.animation=online?'none':'blink-ext .8s step-start infinite';}
  if(lbl){lbl.textContent=online?'RC ●':'RC ✗';lbl.style.color=online?'#00d96a':'#e03020';}
  if(dot2)dot2.classList.toggle('on',online);
  if(txt)txt.textContent=online?'Cloudflare connecté':'En attente de RC…';
  if(last)last.textContent='Dernier contact : '+nowClock();

async function sigSend(msg){
  try{
    await fetch(`${SIG_URL}/send?from=d3&to=rc`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)});
  }catch(e){}
}

async function sigPoll(){
  try{
    const r=await fetch(`${SIG_URL}/poll?role=d3`);
    if(!r.ok)return;
    const data=await r.json();
    for(const msg of(data.messages||[]))sigHandleMessage(msg);
  }catch(e){}
}

async function sigHeartbeat(){
  try{
    await fetch(`${SIG_URL}/heartbeat?role=d3`,{method:'POST'});
    const r=await fetch(`${SIG_URL}/status`);
    if(r.ok){
      const s=await r.json();
      const wasOnline=_rcOnline;
      _rcOnline=s.rc?.online||false;
      if(_rcOnline!==wasOnline)_rcSetStatus(_rcOnline);
    }
  }catch(e){
    setTimeout(()=>fetch(`${SIG_URL}/heartbeat?role=d3`,{method:'POST'}).catch(()=>{}),2000);
  }
}

function sigHandleMessage(msg){
  if(!msg||!msg.action)return;
  _rcSetStatus(true);
  switch(msg.action){
    case 'play-all':
      // RC demande de lancer tous les diffuseurs
      startAllDiffuseurs();
      break;
    case 'stop-all':
      D.forEach(d=>{if(d.playing)d.stopAll();});
      break;
    case 'play-city':
      // RC lance un diffuseur spécifique par index
      if(typeof msg.idx==='number'&&D[msg.idx]&&!D[msg.idx].playing)D[msg.idx].togglePlay();
      break;
    case 'rc-status':
      _rcPlaying=!!msg.playing;_rcTrack=msg.track||'';
      _updateRcDisplay();_updateOnAirBadgesD3();break;
    case 'raccro-ext':
      // RC confirme le raccro — signal visuel
      const btn2=document.getElementById('raccro-regio-btn');
      if(btn2){btn2.style.borderColor='#66bb6a';btn2.style.color='#66bb6a';
        setTimeout(()=>{btn2.style.borderColor='#455a64';btn2.style.color='#78909c';},2000);}
      break;
    case 'status':
      _rcPlaying=!!msg.playing;_rcTrack=msg.track||'';
      _updateRcDisplay();break;
    case 'd2-pong':case 'pong':
      _rcSetStatus(true);break;
    default:
      if(msg.action==='ping'||msg.action==='d3-ping')sigSend({action:'pong',source:'D3'});
  }
}

function _updateRcDisplay(){
  const el=document.getElementById('rc-playing-track');
  if(!el)return;
  if(_rcPlaying&&_rcTrack){el.textContent='▶ '+_rcTrack;el.style.color='#ef5350';}
  else if(_rcPlaying){el.textContent='▶ EN DIRECT';el.style.color='#ef5350';}
  else{el.textContent='Aucune diffusion';el.style.color='#455a64';}
}

function startAllDiffuseurs(){

}

function runRaccroRegio(){
  // Envoyer raccro-ext à RC pour lancer le Diff A
  sigSend({action:'raccro-ext',source:'D3'});
  const btn=document.getElementById('raccro-regio-btn');

    action:(diffuser)=>{

  };
  D[0].tracks.push(macroStep); D[0].durs.push(0); D[0].audios.push(null);

    d.tracks.push(ms2); d.durs.push(0); d.audios.push(null);
    d._updateFdzCount(); d.render();
  });
}

// ── Reconnexion agressive — fonctionne hors LAN, sur mobile, iOS ──
let _consecutiveErrors=0;
const _POLL_FAST=500, _POLL_SLOW=3000;
let _currentPollInterval=_POLL_FAST;
let _pollIntervalId=null, _hbIntervalId=null;

function _startPolling(){
  if(_pollIntervalId) clearInterval(_pollIntervalId);
  if(_hbIntervalId)   clearInterval(_hbIntervalId);
  _pollIntervalId=setInterval(_safePoll,_currentPollInterval);
  _hbIntervalId  =setInterval(_safeHeartbeat,5000);
}
async function _safePoll(){
  try{
    await sigPoll();
    if(_consecutiveErrors>0){_consecutiveErrors=0;if(_currentPollInterval!==_POLL_FAST){_currentPollInterval=_POLL_FAST;_startPolling();}}
  }catch(e){
    _consecutiveErrors++;
    if(_consecutiveErrors>=3&&_currentPollInterval!==_POLL_SLOW){_currentPollInterval=_POLL_SLOW;_startPolling();}
  }
}
async function _safeHeartbeat(){
  try{await sigHeartbeat();_consecutiveErrors=Math.max(0,_consecutiveErrors-1);}
  catch(e){_consecutiveErrors++;}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){_consecutiveErrors=0;_currentPollInterval=_POLL_FAST;_safeHeartbeat();_safePoll();_startPolling();}
});
window.addEventListener('online',()=>{_consecutiveErrors=0;_safeHeartbeat();_safePoll();_startPolling();});
window.addEventListener('offline',()=>{if(_pollIntervalId)clearInterval(_pollIntervalId);if(_hbIntervalId)clearInterval(_hbIntervalId);});

function initSignaling(){
  sigSend({action:'ready',source:'D3'});
  _safeHeartbeat();
  _startPolling();
}

const fmt2=n=>String(n).padStart(2,'0');
function fmtFull(s){if(!isFinite(s)||s<0)s=0;const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);return fmt2(h)+':'+fmt2(m)+':'+fmt2(sec);}
function fmtMs(s){if(!isFinite(s)||s<0)s=0;return fmt2(Math.floor(s/60))+':'+fmt2(Math.floor(s%60));}
function nowClock(){const n=new Date();return fmt2(n.getHours())+':'+fmt2(n.getMinutes())+':'+fmt2(n.getSeconds());}
let _lastClockSec=-1;

async function drawWaveform(canvas,file){
  try{const resp=await fetch(file);const buf=await resp.arrayBuffer();const offCtx=new OfflineAudioContext(1,1,44100);const ab=await offCtx.decodeAudioData(buf);const rawData=ab.getChannelData(0);WV_DATA_CACHE[file]=rawData;drawWaveformFromData(canvas,rawData,0,1);return ab.duration;}catch(e){return 0;}
}
function drawWaveformFromData(canvas,data,startRatio=0,endRatio=1){
  const W=canvas.width,H=canvas.height;const c=canvas.getContext('2d');
  c.fillStyle='#141618';c.fillRect(0,0,W,H);
  c.fillStyle='rgba(255,255,255,0.04)';c.fillRect(0,Math.floor(H/2),W,1);
  const start=Math.floor(startRatio*data.length),end=Math.floor(endRatio*data.length);
  const len=Math.max(1,end-start),step=Math.max(1,Math.floor(len/W));
  for(let x=0;x<W;x++){
    let mn=0,mx=0;const base=start+x*step;
    for(let j=0;j<step;j++){const v=data[base+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    const amp=Math.max(Math.abs(mn),Math.abs(mx));
    if(amp<0.003)continue;
    const y1=Math.round((1+mn)*H/2),y2=Math.round((1+mx)*H/2);
    const br=Math.round(100+amp*155);
    c.fillStyle=`rgb(${Math.round(br*0.55)},${br},${Math.round(br*0.7)})`;
    c.fillRect(x,y1,1,Math.max(1,y2-y1));
  }
}

class Diffuser{
  constructor(cfg,idx){
    this.cfg=cfg;this.idx=idx;this.ids=cfg.ids;
    this.tracks=[];this.durs=[];this.audios=[];
    this.playing=false;this.ci=0;this.auto=false;
    this._chainDone=new Set();this._playToken=0;
    this._outTimer=null;this._removeTimer=null;
    this._stopAfterMacro=false;this._lastSentState='';
  }
  addTracks(newTracks){
    const at=this._insertionIndex();
    this.tracks.splice(at,0,...newTracks);this.durs.splice(at,0,...newTracks.map(()=>0));this.audios.splice(at,0,...newTracks.map(()=>null));
    newTracks.forEach((_,ni)=>{
      const i=at+ni;const a=new Audio();a.src=this.tracks[i].file;
      a.addEventListener('loadedmetadata',()=>{
        const ci=this.tracks.indexOf(this.tracks[i]);const ri=ci!==-1?ci:i;
        this.durs[ri]=a.duration||0;
        if(this.tracks[ri]&&(this.tracks[ri].outCue===null||this.tracks[ri].outCue===undefined))this.tracks[ri].outCue=a.duration;
        this.render();
        const cv=document.getElementById(`wv-d3-${this.idx}-${ri}`);
        if(cv){cv.width=400;cv.height=36;drawWaveform(cv,this.tracks[ri].file);}
      });
      this.audios[i]=a;
    });
    this.render();
    if(this.playing&&!this.audios.some(a=>a&&!a.paused)){this.ci=0;this._startTrack(0);}
  }
  _insertionIndex(){let i=this.tracks.length;while(i>0&&this.tracks[i-1]?.pinned)i--;return i;}
  _inOf(i){return Math.max(0,this.tracks[i]?.inCue||0);}
  _outOf(i){const t=this.tracks[i];if(!t)return 0;return t.outCue!==null?t.outCue:this.durs[i]||0;}
  _playDur(i){return Math.max(0,this._outOf(i)-this._inOf(i));}

  render(){
    const now=new Date();let cur=new Date(now);
    const starts=this.tracks.map((_,i)=>{const t=new Date(cur);cur=new Date(cur.getTime()+this._playDur(i)*1000);return t;});
    const tbody=document.getElementById(this.ids.body);if(!tbody)return;
    tbody.innerHTML='';
    const nextIdx=this.playing?this.tracks.findIndex((tt,ii)=>!tt.isMacro&&this.audios[ii]?.paused&&!tt._launching):-1;
    this.tracks.forEach((t,i)=>{
      const a_i=this.audios[i];
      const isActive=this.playing&&!t.isMacro&&!!a_i&&(!a_i.paused||!!t._launching);
      const isMacroActive=this.playing&&t.isMacro&&i===this.ci;
      const isNext=i===nextIdx;
      const tr=document.createElement('tr');
      if(isActive||isMacroActive)tr.className='row-active';
      else if(isNext)tr.className='row-next';
      tr.onclick=()=>this.jumpTo(i);
      const st=starts[i];
      const hhmm=fmt2(st.getHours())+':'+fmt2(st.getMinutes())+':'+fmt2(st.getSeconds());
      const a=this.audios[i],pos=a?a.currentTime:0;
      const rem=isActive?Math.max(0,this._outOf(i)-pos):this._playDur(i);
      const wvId=`wv-d3-${this.idx}-${i}`;
      const dur=this.durs[i]||1;
      const inPct=(this._inOf(i)/dur*100).toFixed(1);
      const outPct=Math.min(98,(this._outOf(i)/dur*100)).toFixed(1);
      const delBtn=t.pinned?'':`<button onclick="event.stopPropagation();diffRemoveD3(${this.idx},${i})" style="background:transparent;border:none;color:#37474f;cursor:pointer;font-size:10px;padding:0 3px" onmouseover="this.style.color='#ef5350'" onmouseout="this.style.color='#37474f'">✕</button>`;
      const isMacro=!!t.isMacro;

      if(isActive&&!isMacro){
        tr.innerHTML=`
          <td class="cell-num is-playing" style="width:28px;position:relative;z-index:3">▶</td>
          <td style="padding:0 6px;vertical-align:middle;position:relative;z-index:3">
            ${delBtn}<div class="row-active-title">${t.title}</div>
          </td>
          <td style="padding:4px 6px;vertical-align:middle;min-width:160px;position:relative;z-index:3">
            <div style="position:relative;height:36px;border-radius:3px;overflow:hidden">

    if(trackNameEl){const at=anyAudioPlaying&&this.tracks.find((t2,j)=>!t2.isMacro&&this.audios[j]&&(!this.audios[j].paused||t2._launching));trackNameEl.textContent=at?'— '+at.title:'';trackNameEl.style.opacity=at?'1':'0';}
    const hdr=document.getElementById('diff-header-'+this.idx);
    const bar=document.getElementById('diff-onair-'+this.idx);
    if(hdr)hdr.classList.toggle('is-live',this.playing);
    if(bar)bar.classList.toggle('is-live',this.playing);
    const card=document.getElementById(`card-${VILLES[this.idx].id}`);
    if(card)card.classList.toggle('diff-is-live',this.playing);
    _updateOnAirBadgesD3();
    // Notifier RC avec l'état individuel de CE diffuseur
    const activeTitle=anyAudioPlaying?this.tracks.find((t2,j)=>!t2.isMacro&&this.audios[j]&&(!this.audios[j].paused||t2._launching))?.title||'':'';
    const ns=this.playing+'|'+activeTitle;
    if(ns!==this._lastSentState){
      this._lastSentState=ns;
      if(typeof sigSend==='function'){
        sigSend({action:'d3-status',playing:this.playing,city:VILLES[this.idx].label,track:activeTitle});
      }
    }
  }

  tick(){
    if(!this.playing)return;
    let activeIdx=-1;
    for(let j=0;j<this.tracks.length;j++){const a=this.audios[j];if(a&&(!a.paused||this.tracks[j]._launching)&&!this.tracks[j].isMacro){activeIdx=j;break;}}
    if(activeIdx===-1){if(!this.tracks.length||!this.tracks.some((t2,j)=>!t2.isMacro&&this.audios[j]&&(!this.audios[j].paused||t2._launching))){this.playing=false;this.render();}return;}
    const t=this.tracks[activeIdx],audio=this.audios[activeIdx];
    const pos=audio.currentTime;
    const inCue=this._inOf(activeIdx),outCue=this._outOf(activeIdx),fileDur=this.durs[activeIdx]||1;
    const progFull=Math.max(0,Math.min(1,(pos-inCue)/(fileDur-inCue||1)));
    const tr=document.getElementById(this.ids.body)?.querySelector('tr.row-active');
    if(tr){tr.style.setProperty('--prog',progFull);tr.style.setProperty('--out-pct',((outCue/fileDur)*100).toFixed(1)+'%');}
    const cdEl=document.getElementById(this.ids.body+'-cd-'+activeIdx);
    if(cdEl){const rem=outCue-pos;if(rem>0){cdEl.textContent=fmtFull(rem);cdEl.style.color='#ef5350';}else{cdEl.textContent='+ '+fmtFull(-rem);cdEl.style.color='#ffa726';}}
    const pb=document.getElementById(VILLES[this.idx].id+'-progress-fill');if(pb)pb.style.width=(progFull*100).toFixed(2)+'%';
    const micros=document.getElementById(this.ids.micros);if(micros)micros.textContent=fmtMs(pos-inCue);
    _paintStripD3(this.idx);
  }

  _startTrack(i){
    const t=this.tracks[i];if(!t)return;
    if(t.isMacro){
      const token=++this._playToken;
      if(this._outTimer){cancelAnimationFrame(this._outTimer);clearTimeout(this._outTimer);this._outTimer=null;}
      if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
      this.ci=i;this.render();
      if(typeof t.action==='function')t.action(this);
      this._outTimer=setTimeout(()=>{
        if(token!==this._playToken)return;
        const idx=this.tracks.indexOf(t);
        if(idx!==-1){this.tracks.splice(idx,1);this.durs.splice(idx,1);this.audios.splice(idx,1);}
        this.ci=0;this._updateFdzCount();
        if(this.playing&&this.tracks.length>0&&!this._stopAfterMacro)this._startNextInQueue();
        else if(!this.tracks.length)this.playing=false;
        this.render();
      },800);
      return;
    }
    const audio=this.audios[i];if(!audio)return;
    const myToken=++this._playToken;audio.onended=null;
    if(this._outTimer){cancelAnimationFrame(this._outTimer);clearTimeout(this._outTimer);this._outTimer=null;}
    if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
    const inCue=this._inOf(i),fileDur=this.durs[i]||0;
    audio.currentTime=inCue;this.ci=i;
    let _chained=false;
    const _watchOut=()=>{
      if(myToken!==this._playToken||!this.playing||audio.paused)return;
      const currentOut=this._outOf(i);
      if(audio.currentTime>=currentOut&&!_chained){_chained=true;_doChain();}
      else this._outTimer=requestAnimationFrame(_watchOut);
    };
    const _doChain=()=>{
      if(this._outTimer){cancelAnimationFrame(this._outTimer);this._outTimer=null;}
      if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
      if(!this.playing)return;
      const idx=this.tracks.indexOf(t);
      if(idx!==-1){this.tracks.splice(idx,1);this.durs.splice(idx,1);this.audios.splice(idx,1);}
      this.ci=0;this._updateFdzCount();
      if(!this._stopAfterMacro&&this.tracks.length>0)this._startNextInQueue();
      if(!this.tracks.length)this.playing=false;
      this.render();
      const remaining=Math.max(0,(fileDur-audio.currentTime))*1000;
      if(remaining>200)this._removeTimer=setTimeout(()=>{audio.onended=null;if(!audio.paused)audio.pause();},remaining+200);
      else{audio.onended=null;if(!audio.paused)audio.pause();}
    };
    audio.onended=()=>{
      audio.onended=null;
      if(this._outTimer){cancelAnimationFrame(this._outTimer);this._outTimer=null;}
      if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
      if(!_chained){_chained=true;_doChain();}
    };
    t._launching=true;
    this._outTimer=requestAnimationFrame(_watchOut);
    audio.play().then(()=>{t._launching=false;_wireAudioD3(audio,this.idx);}).catch(e=>{
      t._launching=false;audio.onended=null;
      if(this._outTimer){cancelAnimationFrame(this._outTimer);this._outTimer=null;}
    });
  }

  _startNextInQueue(){
    if(!this.playing||!this.tracks.length)return;
    const t=this.tracks[0];
    if(t.isMacro){this._startTrack(0);return;}
    const a=this.audios[0];if(!a)return;
    if(a.paused&&!t._launching)this._startTrack(0);
  }

  _updateFdzCount(){
    const n=this.tracks.length;const el=document.getElementById(this.cfg.fdzCount);
    if(el)el.textContent=n?n+' fichier'+(n>1?'s':''):'Aucun fichier';
  }

  togglePlay(){
    if(!this.tracks.length)return;
    if(!this.tracks.some(t=>!t.isMacro))return;
    if(!this.playing){
      this._stopAfterMacro=false;this.playing=true;this.ci=0;this._chainDone.clear();
      this.tracks.forEach(t2=>{t2._launching=false;});
      this._startTrack(0);this.render();
    }else{
      this._playToken++;
      if(this._outTimer){cancelAnimationFrame(this._outTimer);clearTimeout(this._outTimer);this._outTimer=null;}
      if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
      this.audios.forEach(a=>{if(a){a.onended=null;if(!a.paused)a.pause();}});
      this.tracks.forEach(t2=>{t2._launching=false;});
      this._stopAfterMacro=false;this.playing=false;this.render();
    }
  }

  stopAll(){
    this._playToken++;
    if(this._outTimer){cancelAnimationFrame(this._outTimer);clearTimeout(this._outTimer);this._outTimer=null;}
    if(this._removeTimer){clearTimeout(this._removeTimer);this._removeTimer=null;}
    this.audios.forEach(a=>{if(a){a.onended=null;if(!a.paused)a.pause();a.currentTime=0;}});
    this.tracks.forEach(t2=>{t2._launching=false;});
    this._stopAfterMacro=false;this.playing=false;this.ci=0;this._chainDone.clear();
    const pb=document.getElementById(VILLES[this.idx].id+'-progress-fill');if(pb)pb.style.width='0%';
    this.render();
  }

  toggleAuto(){this.auto=!this.auto;const btn=document.getElementById(this.cfg.autoBtn);if(btn)btn.classList.toggle('active',this.auto);}
  nextTrack(){}
  prevTrack(){}
  jumpTo(i){if(this.playing){this.audios.forEach(a=>{if(a&&!a.paused)a.pause();});this.ci=i;this._chainDone.clear();this._startTrack(i);}else this.ci=i;this.render();}
}

// ═══════════════════════════════════════════════════════
// AUDIO / VU
// ═══════════════════════════════════════════════════════
let _audioCtxD3=null;
function getCtxD3(){if(!_audioCtxD3)_audioCtxD3=new(window.AudioContext||window.webkitAudioContext)();if(_audioCtxD3.state==='suspended')_audioCtxD3.resume();return _audioCtxD3;}
const _masterGnsD3=[];const _vuD3=[];
function _wireAudioD3(el,idx){
  if(!el||el._wiredD3)return;el._wiredD3=true;
  const ctx=getCtxD3();
  if(!_masterGnsD3[idx]){
    const gn=ctx.createGain();
    // Appliquer le gain selon le solo actuel
    gn.gain.value=(_soloIdx===-1)?0:(_soloIdx===idx?1:0);
    const sp=ctx.createChannelSplitter(2);
    const aL=ctx.createAnalyser(),aR=ctx.createAnalyser();
    aL.fftSize=1024;aR.fftSize=1024;aL.smoothingTimeConstant=0.8;aR.smoothingTimeConstant=0.8;
    gn.connect(sp);sp.connect(aL,0);sp.connect(aR,1);gn.connect(ctx.destination);
    _masterGnsD3[idx]=gn;_vuD3[idx]={aL,aR};
  }
  try{const src=ctx.createMediaElementSource(el);src.connect(_masterGnsD3[idx]);}catch(e){}
}
function _paintStripD3(idx){
  if(!_vuD3[idx])return;
  const el=document.getElementById(`vu-strip-${VILLES[idx].id}`);if(!el)return;
  const bars=el.querySelectorAll('.vu-strip-bar');if(!bars.length)return;
  const data=new Float32Array(_vuD3[idx].aL.fftSize);_vuD3[idx].aL.getFloatTimeDomainData(data);
  let s=0;for(const v of data)s+=v*v;
  const rms=Math.sqrt(s/data.length);const db=rms>0?Math.max(-60,20*Math.log10(rms)):-60;
  const active=Math.round(((db+60)/60)*bars.length);
  bars.forEach((b,i)=>b.style.opacity=i<active?'1':'0.08');
}

// ═══════════════════════════════════════════════════════
// FICHIERS / DROP
// ═══════════════════════════════════════════════════════
function handleFilesD3(files,diffIdx){
  const arr=Array.from(files).filter(f=>f.type.startsWith('audio/'));if(!arr.length)return;
  const v=VILLES[diffIdx];
  const newTracks=arr.map((f,i)=>({file:URL.createObjectURL(f),title:f.name.replace(/\.[^/.]+$/,''),color:v.color,inCue:0,outCue:null}));
  D[diffIdx].addTracks(newTracks);
}
function handleDropD3(e,diffIdx){
  e.preventDefault();document.getElementById(`fdz-${VILLES[diffIdx].id}`)?.classList.remove('drag-over');
  handleFilesD3((e.dataTransfer&&e.dataTransfer.files)||[],diffIdx);
}
function diffRemoveD3(diffIdx,trackIdx){
  const d=D[diffIdx];if(!d)return;
  d.tracks.splice(trackIdx,1);d.durs.splice(trackIdx,1);d.audios.splice(trackIdx,1);
  d.ci=0;d._updateFdzCount();d.render();
}

// ═══════════════════════════════════════════════════════
// POIGNÉES WAVEFORM
// ═══════════════════════════════════════════════════════
function _bindHandlesD3(wvId,diffIdx,trackIdx){
  const cv=document.getElementById(wvId);if(!cv)return;
  const wrap=cv.parentElement;
  const inH=document.getElementById(wvId+'-in');
  const outH=document.getElementById(wvId+'-out');
  if(!wrap||!inH||!outH)return;
  const xToR=(clientX)=>{const rect=wrap.getBoundingClientRect();return Math.min(1,Math.max(0,(clientX-rect.left)/rect.width));};
  const applyIn=(sec)=>{const dur=D[diffIdx].durs[trackIdx]||1;const pct=(sec/dur*100).toFixed(2);inH.style.left=pct+'%';const pre=document.getElementById(wvId+'-pre');if(pre)pre.style.width=pct+'%';};
  const applyOut=(sec)=>{const dur=D[diffIdx].durs[trackIdx]||1;const pct=(sec/dur*100).toFixed(2);outH.style.left=pct+'%';const post=document.getElementById(wvId+'-post');if(post)post.style.left=pct+'%';};
  const bindOne=(handle,type)=>{
    let active=false;
    handle.addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();active=true;document.body.style.userSelect='none';},{passive:false});
    document.addEventListener('mousemove',e=>{
      if(!active)return;const t=D[diffIdx].tracks[trackIdx];if(!t)return;
      const dur=D[diffIdx].durs[trackIdx]||1,sec=xToR(e.clientX)*dur;
      if(type==='in'){t.inCue=Math.max(0,Math.min(sec,(t.outCue??dur)-0.1));applyIn(t.inCue);}
      else{t.outCue=Math.min(dur,Math.max(sec,(t.inCue||0)+0.1));applyOut(t.outCue);}
    });
    document.addEventListener('mouseup',()=>{
      if(!active)return;active=false;document.body.style.userSelect='';
      const cv2=document.getElementById(wvId);const file=D[diffIdx].tracks[trackIdx]?.file;
      if(cv2&&file&&WV_DATA_CACHE[file])drawWaveformFromData(cv2,WV_DATA_CACHE[file],0,1);
    });
  };
  bindOne(inH,'in');bindOne(outH,'out');
}

// BOUCLE PRINCIPALE

function mainLoop(){
  requestAnimationFrame(mainLoop);
  D.forEach(d=>d.tick());
  _paintAllMonVU();
  _updateMonitoringUI();
  const sec=new Date().getSeconds();
  if(sec!==_lastClockSec){
    _lastClockSec=sec;
    const clk=document.getElementById('clock');if(clk)clk.textContent=nowClock();
  }
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildCards();
const D=CONFIGS.map((cfg,i)=>new Diffuser(cfg,i));

// ── Mode miroir : Marseille (D[0]) pilote tous les autres ──
// Chaque action sur D[0] est répliquée sur D[1..7]

function _mirrorTogglePlay(){
  getCtxD3().resume();
  const wasPlaying = D[0].playing;
  // Lancer D[0]
  const origPlay = Diffuser.prototype.togglePlay.bind(D[0]);
  origPlay();
  // Répliquer sur D[1..7] si D[0] démarre
  setTimeout(()=>{
    if(D[0].playing !== wasPlaying){
      D.forEach((d,i)=>{
        if(i===0) return;
        if(D[0].playing && !d.playing && d.tracks.some(t=>!t.isMacro)){
          d.playing=true; d.ci=0; d._chainDone.clear();
          d.tracks.forEach(t2=>{t2._launching=false;});
          d._startTrack(0); d.render();
        } else if(!D[0].playing && d.playing){
          d._playToken++;
          if(d._outTimer){cancelAnimationFrame(d._outTimer);clearTimeout(d._outTimer);d._outTimer=null;}
          if(d._removeTimer){clearTimeout(d._removeTimer);d._removeTimer=null;}
          d.audios.forEach(a=>{if(a){a.onended=null;if(!a.paused)a.pause();}});
          d.tracks.forEach(t2=>{t2._launching=false;});
          d.playing=false; d.render();
        }
      });
    }
  }, 50);
}

function _mirrorStopAll(){
  D[0].stopAll();
  D.forEach((d,i)=>{ if(i>0) d.stopAll(); });
}

function _mirrorToggleAuto(){
  D[0].toggleAuto();
  D.forEach((d,i)=>{
    if(i===0) return;
    d.auto = D[0].auto;
    const btn=document.getElementById(d.cfg.autoBtn);
    if(btn) btn.classList.toggle('active', d.auto);
  });
}

// Surcharger les contrôles de Marseille (D[0]) dans le DOM
// Les boutons onclick appellent D[0].togglePlay() — on les remplace
document.querySelectorAll('[onclick="D[0].togglePlay()"]').forEach(btn=>{
  btn.setAttribute('onclick','_mirrorTogglePlay()');
});
document.querySelectorAll('[onclick="D[0].stopAll()"]').forEach(btn=>{
  btn.setAttribute('onclick','_mirrorStopAll()');
});
document.querySelectorAll('[onclick="D[0].toggleAuto()"]').forEach(btn=>{
  btn.setAttribute('onclick','_mirrorToggleAuto()');
});

// Patch addTracks de D[0] pour répliquer les fichiers chargés sur Marseille
const _origAddTracks = D[0].addTracks.bind(D[0]);
D[0].addTracks = function(newTracks){
  _origAddTracks(newTracks);
  // Envoyer la liste des pistes à RC pour affichage (métadonnées seulement)
  // On attend que les durées soient chargées (loadedmetadata) avant d'envoyer
  const _sendTrackList=()=>{
    const list=D[0].tracks.filter(t=>!t.isMacro).map(t=>({
      title:t.title, dur:D[0].durs[D[0].tracks.indexOf(t)]||0, color:t.color
    }));
    if(typeof sigSend==='function'){
      sigSend({action:'track-list', source:'D3', city:'MARSEILLE', tracks:list});
    }
  };
  // Attendre 1.5s que les métadonnées soient chargées
  setTimeout(_sendTrackList, 1500);
  // Répliquer les mêmes pistes sur D[1..7]
  D.forEach((d,i)=>{
    if(i===0) return;
    const cloned = newTracks.map(t=>({...t, inCue:t.inCue||0, outCue:t.outCue||null}));
    // Réutiliser le même blob URL (fichier déjà en mémoire)
    const at=d._insertionIndex();
    d.tracks.splice(at,0,...cloned);
    d.durs.splice(at,0,...cloned.map(()=>0));
    d.audios.splice(at,0,...cloned.map(()=>null));
    cloned.forEach((ct,ni)=>{
      const idx=at+ni;
      const a=new Audio(); a.src=ct.file;
      a.addEventListener('loadedmetadata',()=>{
        const ri=d.tracks.indexOf(ct);if(ri===-1)return;
        d.durs[ri]=a.duration||0;
        if(d.tracks[ri]&&(d.tracks[ri].outCue===null||d.tracks[ri].outCue===undefined)) d.tracks[ri].outCue=a.duration;
        d.render();
        const cv=document.getElementById(`wv-d3-${i}-${ri}`);
        if(cv){cv.width=400;cv.height=36;if(WV_DATA_CACHE[ct.file])drawWaveformFromData(cv,WV_DATA_CACHE[ct.file],0,1);else drawWaveform(cv,ct.file);}
      });
      d.audios[idx]=a;
    });
    d._updateFdzCount(); d.render();
  });
};

else _onReady();

// ── Fix AudioContext iOS Safari ──
// iOS bloque AudioContext sans geste utilisateur explicite
let _audioUnlocked=false;
function _unlockAudio(){
  if(_audioUnlocked) return;
  const ctx=typeof getCtx==='function'?getCtx():(typeof getCtxD3==='function'?getCtxD3():null);
  if(ctx&&ctx.state==='suspended') ctx.resume().then(()=>{_audioUnlocked=true;});
  // Créer un buffer silencieux pour forcer le déverrouilage iOS
  if(ctx){
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf; src.connect(ctx.destination); src.start(0);
    _audioUnlocked=true;
  }
}
document.addEventListener('touchstart',_unlockAudio,{once:true,passive:true});
document.addEventListener('touchend',_unlockAudio,{once:true,passive:true});
document.addEventListener('click',_unlockAudio,{once:true,passive:true});
